          <span class="block w-6 h-[2px] bg-gray-800 transition-all duration-300 ease-in-out"></span>

    <main class="relative flex flex-col flex-1 z-20 bg-white">

    <!-- Footer -->

          <!-- Logo placeholder -->

          <!-- Menu column -->

            <div class="text-left">

                <li><a href="/" class="text-gray-400 hover:text-white transition-colors">Home</a></li>
                <li><a href="/about" class="text-gray-400 hover:text-white transition-colors">About</a></li>
                <li><a href="/contact" class="text-gray-400 hover:text-white transition-colors">Contact</a></li>
              </ul>
            </div>
          </div>
          <!-- Contact/Social column -->

            <a href="mailto:contact@conscient.ai" class="text-gray-400 hover:text-white transition-colors block mb-4">contact@conscient.ai</a>
            <!-- <p class="text-gray-400 mb-4">+1 234 567 890</p> -->
            <div class="flex justify-start gap-4">
              <div class="w-8 h-8">
                <a href="https://www.linkedin.com/company/conscientai" target="_blank" aria-label="LinkedIn" class="text-gray-400 hover:text-[#2867B2] transition">

    <!-- Mobile Menu -->
    <nav id="mobile-menu" class="hidden fixed inset-0 w-full h-full bg-white flex flex-col items-center justify-center space-y-8 text-lg uppercase tracking-widest sm:hidden z-[100]">
      <a href="/services" class="animate-mobile-menu-item opacity-0 [animation-delay:100ms] block transition-colors duration-200 active:text-gray-400">Services</a>
      <a href="/research" class="animate-mobile-menu-item opacity-0 [animation-delay:200ms] block transition-colors duration-200 active:text-gray-400">Research</a>
      <a href="/case-studies" class="animate-mobile-menu-item opacity-0 [animation-delay:300ms] block transition-colors duration-200 active:text-gray-400">Case Studies</a>
      <a href="/about" class="animate-mobile-menu-item opacity-0 [animation-delay:400ms] block transition-colors duration-200 active:text-gray-400">About</a>
      <a href="/contact" class="animate-mobile-menu-item opacity-0 [animation-delay:500ms] block transition-colors duration-200 active:text-gray-400">Contact</a>
    </nav>
    <script>
      const header = document.getElementById('main-header');
      const btn = document.getElementById('hamburger-btn');
      const menu = document.getElementById('mobile-menu');
      const html = document.documentElement;
      const body = document.body;

      let scrollY = 0;

      function updateHeaderStyle() {
        const isMenuOpen = !menu.classList.contains('hidden');
        const isScrolled = window.scrollY > 20;

        if (isMenuOpen) {
          // When menu is open, header must match the mobile menu background exactly
          header.classList.add('bg-white');
          header.classList.remove('bg-transparent', 'backdrop-blur-md', 'bg-white/50');
        } else if (isScrolled) {
          // When scrolling down (menu closed)
          header.classList.add('backdrop-blur-md', 'bg-white/50');
          header.classList.remove('bg-transparent', 'bg-white');
        } else {
          // At the very top (menu closed)
          header.classList.add('bg-transparent');
          header.classList.remove('backdrop-blur-md', 'bg-white/50', 'bg-white');
        }
      }

      function openMenu() {
        menu.classList.remove('hidden');
        btn.classList.add('open');

        // lock scroll position
        scrollY = window.scrollY || window.pageYOffset;
        body.style.top = `-${scrollY}px`;
        html.classList.add('scroll-lock');
        body.classList.add('scroll-lock');

        updateHeaderStyle();
      }

      function closeMenu() {
        // Disable the transition temporarily to prevent the "laggy" fade
        header.style.transition = 'none';

        menu.classList.add('hidden');
        btn.classList.remove('open');

        html.classList.remove('scroll-lock');
        body.classList.remove('scroll-lock');
        body.style.top = '';
        // Restore scroll
        window.scrollTo(0, scrollY);
        // Immediately update style while transition is 'none'
        updateHeaderStyle();

        // Force a "reflow" so the browser applies the styles instantly,
        // then turn the transition back on for normal scrolling
        requestAnimationFrame(() => {
          header.style.transition = '';
        });
      }

      // Single scroll listener
      window.addEventListener('scroll', updateHeaderStyle);

      btn.addEventListener('click', () => {
        menu.classList.contains('hidden') ? openMenu() : closeMenu();
      });

      menu.querySelectorAll('a').forEach(a => a.addEventListener('click', closeMenu));
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeMenu();
      });

      // Start dynamically loading posts
      const postsGridContainer = document.getElementById('posts-grid');
      const paginationControls = document.getElementById('pagination-controls');
      const postsPerPage = 9;

      const urlParams = new URLSearchParams(window.location.search);
      let currentPage = parseInt(urlParams.get('page')) || 1;

      fetch('/blog/posts.json')
        .then(response => response.json())
        .then(data => {
          const sortedPosts = data.sort((a, b) => new Date(b.date) - new Date(a.date));

          const totalPosts = sortedPosts.length;
          const totalPages = Math.max(1, Math.ceil(totalPosts / postsPerPage));

          if (currentPage < 1) currentPage = 1;
          if (currentPage > totalPages) currentPage = totalPages;

          const startIndex = (currentPage - 1) * postsPerPage;
          const endIndex = startIndex + postsPerPage;
          const paginatedSlice = sortedPosts.slice(startIndex, endIndex);

          if (paginatedSlice.length > 0) {
            renderPostsGrid(paginatedSlice);
          }
          renderPaginationControls(currentPage, totalPages);
        });

      function renderPostsGrid(posts) {
        postsGridContainer.innerHTML = '';

        posts.forEach(post => {
          const el = document.createElement('a');
          el.href = post.url;
          el.className = "group block flex flex-col";
          el.innerHTML = `
            <div class="flex flex-col relative z-10 h-full">
              <div class="aspect-[16/10] overflow-hidden bg-gray-100 mb-6 rounded-md border border-gray-50 shadow-sm">
                <img src="${post.image}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" alt="${post.title}">
              </div>
              <span class="text-[10px] font-bold uppercase tracking-widest text-[#15899e] block mb-2">
                ${post.category}
              </span>
              <h3 class="text-xl font-semibold text-gray-900 leading-snug line-clamp-2 mb-3">
                ${post.title}
              </h3>
              <div class="text-xs uppercase tracking-widest text-gray-400 mb-4">
                <span>${post.date}</span>
              </div>
              <p class="text-sm text-gray-800 leading-relaxed line-clamp-3">
                ${post.excerpt}
              </p>
            </div>
          `;
          postsGridContainer.appendChild(el);
        });
      }

      function renderPaginationControls(current, total) {
        paginationControls.innerHTML = '';

        for (let i = 1; i <= total; i++) {
          const pageLink = document.createElement('a');
          pageLink.href = `?page=${i}`;
          pageLink.innerText = i;

          if (i === current) {
            pageLink.className = "w-10 h-10 flex items-center justify-center text-xs font-semibold rounded-full bg-gray-900 text-white pointer-events-none";
          } else {
            pageLink.className = "w-10 h-10 flex items-center justify-center text-xs text-gray-500 hover:text-gray-900 border border-transparent hover:border-gray-200 font-medium rounded-full transition-all duration-200";
          }

          paginationControls.appendChild(pageLink);
        }
      }
      // End dynamically loading posts

      // Dynamically set copyright current year
      const now = new Date();
      const currentYear = now.getUTCFullYear();
      document.getElementById('current-year').textContent = currentYear;
    </script>
  </body>
